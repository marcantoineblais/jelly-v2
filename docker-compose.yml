# Per-machine: set host paths in .env (DOWNLOADS_PATH, ENCODE_PATH, TV_SHOWS_PATH, etc.).
services:
  next:
    build: .
    command: ["sh", "-c", "echo 'Waiting for file-server...'; until node -e \"require('http').get(process.env.FILE_SERVER_URL, (r)=>{ r.resume(); process.exit(0); }).on('error', ()=>{ process.exit(1); })\" 2>/dev/null; do sleep 1; done; echo 'Starting Next.js'; exec node node_modules/next/dist/bin/next start -H 0.0.0.0 -p \"$${PORT:-4000}\""]
    env_file: .env
    environment:
      - FILE_SERVER_URL=http://file-server:${FILE_SERVER_PORT:-4002}
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    volumes:
      - ./config.json:/app/config.json:ro
      # Add host paths for file-server to read/write
      - /mnt/downloads:/mnt/downloads
      - /mnt/encodes:/mnt/encodes
      - /mnt/media:/mnt/media
    depends_on:
      - file-server
    restart: unless-stopped

  socket-server:
    build: .
    command: ["node", "socket-server.js"]
    env_file: .env
    ports:
      - "${SOCKET_SERVER_PORT:-4001}:${SOCKET_SERVER_PORT:-4001}"

  file-server:
    build: .
    command: ["node", "file-server.js"]
    env_file: .env
    environment:
      - SOCKET_SERVER_WS_URL=ws://socket-server:${SOCKET_SERVER_PORT:-4001}
    ports:
      - "${FILE_SERVER_PORT:-4002}:${FILE_SERVER_PORT:-4002}"
    volumes:
      - ./config.json:/app/config.json:ro
      # Add host paths for file-server to read/write
      - /mnt/downloads:/mnt/downloads
      - /mnt/encodes:/mnt/encodes
      - /mnt/media:/mnt/media
    depends_on:
      - socket-server

# Per-machine: set host paths in .env (DOWNLOADS_PATH, ENCODE_PATH, TV_SHOWS_PATH, etc.).
services:
  jelly:
    image: ${JELLY_IMAGE:-jelly:latest}
    env_file: stack.env
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    volumes:
      - /opt/jelly/config.json:/app/config.json:ro
      # Add host paths for file-server to read/write
      - /mnt/downloads:/mnt/downloads
      - /mnt/encodes:/mnt/encodes
      - /mnt/media:/mnt/media
    depends_on:
      - file-server
    restart: unless-stopped

  socket-server:
    image: ${JELLY_IMAGE:-jelly:latest}
    command: ["node", "socket-server.js"]
    env_file: stack.env
    ports:
      - "${SOCKET_SERVER_PORT:-4001}:${SOCKET_SERVER_PORT:-4001}"

  file-server:
    image: ${JELLY_IMAGE:-jelly:latest}
    command: ["node", "file-server.js"]
    env_file: stack.env
    environment:
      - SOCKET_SERVER_WS_URL=ws://socket-server:${SOCKET_SERVER_PORT:-4001}
    ports:
      - "${FILE_SERVER_PORT:-4002}:${FILE_SERVER_PORT:-4002}"
    volumes:
      - /opt/jelly/config.json:/app/config.json:ro
      # Add host paths for file-server to read/write
      - /mnt/downloads:/mnt/downloads
      - /mnt/encodes:/mnt/encodes
      - /mnt/media:/mnt/media
    depends_on:
      - socket-server

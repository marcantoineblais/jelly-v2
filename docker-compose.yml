# Per-machine: set host paths in .env (DOWNLOADS_PATH, ENCODE_PATH, TV_SHOWS_PATH, etc.).
x-common-image: &common-image ghcr.io/marcantoineblais/jelly:2.1.2

services:
  jelly:
    image: *common-image
    container_name: jelly
    env_file: stack.env
    volumes:
      - /opt/jelly/config.json:/app/config.json:ro
      # Add host paths for file-server to read/write
      - /mnt/downloads:/mnt/downloads
      - /mnt/encodes:/mnt/encodes
      - /mnt/media:/mnt/media
    depends_on:
      - files-server
    restart: unless-stopped
    networks:
      - private
      - caddy_proxy

  socket-server:
    image: *common-image
    container_name: jelly-socket-server
    command: ["node", "socket-server.js"]
    env_file: stack.env
    networks:
      - private
      - caddy_proxy

  files-server:
    image: *common-image
    container_name: jelly-files-server
    command: ["node", "file-server.js"]
    env_file: stack.env
    volumes:
      - /opt/jelly/config.json:/app/config.json:ro
      # Add host paths for file-server to read/write
      - /mnt/downloads:/mnt/downloads
      - /mnt/encodes:/mnt/encodes
      - /mnt/media:/mnt/media
    depends_on:
      - socket-server
    networks:
      - private

networks:
  private:
    driver: bridge
  caddy_proxy:
    external: true

# Uses .env for ports and optional config (DOWNLOAD_PATHS, LIBRARIES_JSON, VIDEOS_EXT).
# Copy .env.example to .env and set values. Mount config.json or use env vars per machine.
services:
  next:
    build: .
    command: ["node", "node_modules/next/dist/bin/next", "start", "-H", "0.0.0.0"]
    env_file: .env
    environment:
      - FILE_SERVER_URL=http://file-server:${FILE_SERVER_PORT:-4002}
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    volumes:
      - ./config.json:/app/config.json:ro
    depends_on:
      - file-server

  socket-server:
    build: .
    command: ["node", "socket-server.js"]
    env_file: .env
    ports:
      - "${SOCKET_SERVER_PORT:-4001}:${SOCKET_SERVER_PORT:-4001}"
    # file-server connects via SOCKET_SERVER_WS_URL (set for Docker)

  file-server:
    build: .
    command: ["node", "file-server.js"]
    env_file: .env
    environment:
      - SOCKET_SERVER_WS_URL=ws://socket-server:${SOCKET_SERVER_PORT:-4001}
    ports:
      - "${FILE_SERVER_PORT:-4002}:${FILE_SERVER_PORT:-4002}"
    volumes:
      - ./config.json:/app/config.json:ro
    depends_on:
      - socket-server

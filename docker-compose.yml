# Per-machine: set host paths in .env (DOWNLOADS_PATH, ENCODE_PATH, TV_SHOWS_PATH, etc.).
# qBittorrent: set Default save path = /downloads in Web UI. Incomplete use default downloads/temp.
x-common-image: &common-image ghcr.io/marcantoineblais/jelly:3.0.0

services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: jelly-flaresolverr
    environment:
      - TZ=America/Toronto
      - LOG_LEVEL=info
    restart: unless-stopped
    networks:
      - private
      - caddy_proxy

  jackett:
    image: linuxserver/jackett:latest
    container_name: jelly-jackett
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
    volumes:
      - /opt/jackett/config:/config
    depends_on:
      - flaresolverr
    restart: unless-stopped
    networks:
      - private

  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: jelly-qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
      - WEBUI_PORT=8080
    volumes:
      - /opt/qbittorrent/config:/config
      - /mnt/downloads:/downloads
    restart: unless-stopped
    networks:
      - private
      - caddy_proxy

  jelly:
    image: *common-image
    container_name: jelly
    env_file: stack.env
    volumes:
      - /opt/jelly/config.json:/app/config.json:ro
      # Add host paths for file-server to read/write
      - /mnt/downloads:/mnt/downloads
      - /mnt/encodes:/mnt/encodes
      - /mnt/media:/mnt/media
    depends_on:
      - files-server
    restart: unless-stopped
    networks:
      - private
      - caddy_proxy

  socket-server:
    image: *common-image
    container_name: jelly-socket-server
    command: ["node", "socket-server.js"]
    env_file: stack.env
    networks:
      - private
      - caddy_proxy

  files-server:
    image: *common-image
    container_name: jelly-files-server
    command: ["node", "file-server.js"]
    env_file: stack.env
    volumes:
      - /opt/jelly/config.json:/app/config.json:ro
      # Add host paths for file-server to read/write
      - /mnt/downloads:/mnt/downloads
      - /mnt/encodes:/mnt/encodes
      - /mnt/media:/mnt/media
    depends_on:
      - socket-server
    networks:
      - private

networks:
  private:
    driver: bridge
  caddy_proxy:
    external: true

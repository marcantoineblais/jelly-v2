# Per-machine: set host paths in .env (DOWNLOADS_PATH, ENCODE_PATH, TV_SHOWS_PATH, etc.).
# qBittorrent: set Default save path = /downloads in Web UI. Incomplete use default downloads/temp.

services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: jelly-flaresolverr
    environment:
      - TZ=America/Toronto
      - LOG_LEVEL=info
      - PORT=${FLARESOLVERR_PORT:-8191}
    restart: unless-stopped
    ports:
      - ${FLARESOLVERR_PORT:-8191}:${FLARESOLVERR_PORT:-8191}
    networks:
      - private

  jackett:
    image: linuxserver/jackett:latest
    container_name: jelly-jackett
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
    volumes:
      - /opt/jackett/config:/config
    depends_on:
      - flaresolverr
    restart: unless-stopped
    ports:
      - ${JACKETT_PORT:-9117}:9117 # Jackett has no env for internal port
    networks:
      - private

  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: jelly-qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
      - WEBUI_PORT=${QBITTORRENT_WEBUI_PORT:-8080}
    volumes:
      - /opt/qbittorrent/config:/config
      - /mnt/downloads:/downloads
    restart: unless-stopped
    ports:
      - ${QBITTORRENT_WEBUI_PORT:-8080}:${QBITTORRENT_WEBUI_PORT:-8080}
    networks:
      - private

networks:
  private:
    driver: bridge
